# 张利伟的投资组合分析配置
# 分析日期：2026-03-31
# 运行命令：tradingagents portfolio wei_portfolio.yaml

settings:
  # 分析日期（YYYY-MM-DD）
  # analysis_date: "2026-03-31"
  
  # LLM 提供商和模型
  llm_provider: "bailian"
  model: "qwen3.5-flash"
  
  # =========================================
  # 分析师配置：启用所有分析师进行全维度分析
  # =========================================
  # 可用选项:
  #   "all" - 启用所有 4 个分析师 (market, social, news, fundamentals)
  #   ["market", "fundamentals"] - 只启用市场和基本面 (推荐，平衡速度与质量)
  #   ["market"] - 只启用市场分析师 (最快)
  #   ["fundamentals"] - 只启用基本面分析师 (价值投资)
  #   自定义组合：["market", "news"] 等等
  #
  # 当前设置："all" = 全面分析，适合重要决策和季度复盘
  # =========================================
  analysts: "all"
  
  # 研究深度：1-5 (影响辩论轮次)
  #   depth: 1 - 快速分析 (各分析师说一次)
  #   depth: 2 - 标准深度 (推荐)
  #   depth: 3+ - 深度辩论 (更详细但耗时更长)
  depth: 1

# =========================================
# 持仓和关注股票列表
# =========================================
positions:
  # ==================== 当前持仓 ====================
  - ticker: "XPEV"
    shares: 85
    cost_basis: 18.6
    position_type: "long"
    holding_days: 30
    # 小鹏汽车 - 当前持仓，需要评估是否继续持有或加仓

  # ==================== 重点关注 - 计划建仓 ====================
  
  # --- 中概股 ---
  - ticker: "BABA"
    shares: 0
    cost_basis: 0
    position_type: "long"
    holding_days: 0
    # 阿里巴巴 - 目标仓位约 15% ($15,000)
